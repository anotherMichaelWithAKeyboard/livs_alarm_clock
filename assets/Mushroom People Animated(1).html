<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mushroom People — Animated Seasonal v2</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Press Start 2P',monospace; background:#ede8d5; overflow-x:hidden; }

    .page-header { background:#2a1604; padding:18px 40px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    .page-header h1 { font-size:10px; color:#f0d090; flex:1; }
    .page-header .sub { font-size:4.5px; color:#907050; letter-spacing:2px; }
    #modeBtn { font-family:'Press Start 2P',monospace; font-size:6px; cursor:pointer; border:none; border-radius:3px; padding:8px 12px; background:#f0d090; color:#2a1604; transition:background .15s,color .15s; }
    #modeBtn.active { background:#1a0e60; color:#a0e0ff; border:1px solid #4060c0; }

    .season { padding:26px 40px 22px; border-bottom:3px solid rgba(0,0,0,.05); }
    .season-spring  { background:#f2faf0; }
    .season-summer  { background:#fef9e6; }
    .season-autumn  { background:#fdf0de; }
    .season-winter  { background:#eaf0fa; }
    .season-special { background:#0e0620; }

    .season-title { font-size:9px; margin-bottom:18px; display:flex; align-items:center; gap:12px; }
    .season-spring  .season-title { color:#6a2880; }
    .season-summer  .season-title { color:#6a3808; }
    .season-autumn  .season-title { color:#6a2808; }
    .season-winter  .season-title { color:#1a2870; }
    .season-special .season-title { color:#d0a0ff; }
    .season-title::after { content:''; flex:1; height:2px; border-radius:1px; opacity:.22; background:currentColor; }

    .group { margin-bottom:22px; }
    .group-label { font-size:4.5px; letter-spacing:3px; text-transform:uppercase; margin-bottom:13px; opacity:.4; }
    .season-special .group-label { color:#a070e0; opacity:.6; }

    .chars-row { display:flex; flex-wrap:wrap; gap:6px 10px; align-items:flex-end; }
    .flora-row  { display:flex; flex-wrap:wrap; gap:6px 14px; align-items:flex-end; }

    .char-card { display:flex; flex-direction:column; align-items:center; gap:5px; padding:10px 7px 7px; border-radius:3px; cursor:default; transition:background .12s; }
    .season-spring  .char-card:hover { background:rgba(200,140,210,.18); }
    .season-summer  .char-card:hover { background:rgba(240,195,50,.18); }
    .season-autumn  .char-card:hover { background:rgba(220,110,40,.18); }
    .season-winter  .char-card:hover { background:rgba(140,180,230,.2); }
    .season-special .char-card:hover { background:rgba(160,80,255,.2); }

    .char-name { font-size:3.8px; text-align:center; max-width:82px; line-height:1.9; opacity:.6; }
    .season-special .char-name { color:#d0b0ff; opacity:.8; }
    .char-class { font-size:3.2px; color:#a070d0; text-align:center; opacity:.7; margin-top:-3px; letter-spacing:1px; }

    .expr-strip { display:flex; gap:3px; align-items:flex-end; margin-top:3px; }

    .flora-card { display:flex; flex-direction:column; align-items:center; gap:5px; padding:6px 4px 4px; }
    .flora-name { font-size:3.8px; text-align:center; max-width:62px; line-height:1.9; opacity:.5; }
    .flora-wrap { display:inline-block; transform-origin:bottom center; }

    @keyframes floraSwayAnim   { 0%,100%{transform:rotate(0deg)} 30%{transform:rotate(-4deg)} 70%{transform:rotate(4deg)} }
    @keyframes floraBopAnim    { 0%,100%{transform:translateY(0) rotate(0deg)} 40%{transform:translateY(-4px) rotate(2deg)} 60%{transform:translateY(-4px) rotate(-2deg)} }
    @keyframes floraQuiverAnim { 0%,100%{transform:rotate(0deg) scaleY(1)} 25%{transform:rotate(-2deg) scaleY(1.03)} 75%{transform:rotate(2deg) scaleY(.98)} }

    .flora-sway   { animation:floraSwayAnim   var(--fd,2.2s) ease-in-out var(--fdl,0s) infinite; }
    .flora-bop    { animation:floraBopAnim     var(--fd,1.6s) ease-in-out var(--fdl,0s) infinite; }
    .flora-quiver { animation:floraQuiverAnim  var(--fd,1.2s) ease-in-out var(--fdl,0s) infinite; }

    @keyframes walkAnim { 0%{transform:translateX(0)} 25%{transform:translateX(18px)} 50%{transform:translateX(0)} 75%{transform:translateX(-18px)} 100%{transform:translateX(0)} }
    @keyframes bobAnim  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes wigAnim  { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-6deg)} 75%{transform:rotate(6deg)} }
    @keyframes floatAnim{ 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(-7px) rotate(2deg)} }
    @keyframes royalBop { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    @keyframes gentleBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
    @keyframes vineSway { 0%,100%{transform:rotate(0deg) translateX(0)} 33%{transform:rotate(-2deg) translateX(-2px)} 66%{transform:rotate(2deg) translateX(2px)} }

    .anim-wrap { display:block; }

    /* Spore puff animation */
    .spore-wrap { position:relative; display:inline-block; }
    .spore-particle {
      position:absolute; width:6px; height:6px; border-radius:50%;
      pointer-events:none; opacity:0;
    }
    @keyframes sporePuffL {
      0%   { transform:translate(0,0) scale(0.3); opacity:0; }
      20%  { opacity:0.8; }
      100% { transform:translate(-22px,-26px) scale(1.2); opacity:0; }
    }
    @keyframes sporePuffR {
      0%   { transform:translate(0,0) scale(0.3); opacity:0; }
      20%  { opacity:0.8; }
      100% { transform:translate(22px,-26px) scale(1.2); opacity:0; }
    }
    @keyframes sporePuffU {
      0%   { transform:translate(0,0) scale(0.3); opacity:0; }
      20%  { opacity:0.8; }
      100% { transform:translate(0,-32px) scale(1.4); opacity:0; }
    }
    .spore-L { animation:sporePuffL 2.4s ease-out infinite; }
    .spore-R { animation:sporePuffR 2.4s ease-out 0.6s infinite; }
    .spore-U { animation:sporePuffU 2.4s ease-out 1.2s infinite; }

    /* Vine wrap */
    .vine-wrap { display:inline-block; transform-origin:top center; }
    .vine-anim { animation:vineSway var(--vd,4s) ease-in-out infinite; }

    body.mode-8bit .anim-wrap[data-anim="walk"] { animation-timing-function:steps(6)!important; }
    body.mode-8bit .anim-wrap[data-anim="bob"]  { animation-timing-function:steps(3)!important; }
    body.mode-8bit .anim-wrap[data-anim="wig"]  { animation-timing-function:steps(4)!important; }
    body.mode-8bit .anim-wrap[data-anim="float"]{ animation-timing-function:steps(4)!important; }
    body.mode-8bit .flora-sway,.mode-8bit .flora-bop,.mode-8bit .flora-quiver { animation-timing-function:steps(3); }

    canvas { image-rendering:pixelated; image-rendering:crisp-edges; display:block; }
  </style>
</head>
<body>
<div class="page-header">
  <h1>🍄 MUSHROOM PEOPLE</h1>
  <div class="sub">ANIMATED SEASONAL v2 · PIXEL ART · MANY VARIETIES</div>
  <button id="modeBtn" onclick="toggleMode()">⬛ 8-BIT MODE</button>
</div>

<div class="season season-spring">
  <div class="season-title">🌸 Spring</div>
  <div class="group"><div class="group-label">Mushroom Folk</div><div class="chars-row" id="sc"></div></div>
  <div class="group"><div class="group-label">Flora</div><div class="flora-row" id="sf"></div></div>
</div>
<div class="season season-summer">
  <div class="season-title">☀️ Summer</div>
  <div class="group"><div class="group-label">Mushroom Folk</div><div class="chars-row" id="uc"></div></div>
  <div class="group"><div class="group-label">Flora</div><div class="flora-row" id="uf"></div></div>
</div>
<div class="season season-autumn">
  <div class="season-title">🍂 Autumn</div>
  <div class="group"><div class="group-label">Mushroom Folk</div><div class="chars-row" id="ac"></div></div>
  <div class="group"><div class="group-label">Flora</div><div class="flora-row" id="af"></div></div>
</div>
<div class="season season-winter">
  <div class="season-title">❄️ Winter</div>
  <div class="group"><div class="group-label">Mushroom Folk</div><div class="chars-row" id="wc"></div></div>
  <div class="group"><div class="group-label">Flora</div><div class="flora-row" id="wf"></div></div>
</div>
<div class="season season-special">
  <div class="season-title">👑 Royal Court &amp; Little Folk</div>
  <div class="group"><div class="group-label">Royalty (Bopping)</div><div class="chars-row" id="royals"></div></div>
  <div class="group"><div class="group-label">Baby Mushrooms</div><div class="chars-row" id="babies"></div></div>
  <div class="group"><div class="group-label">Cute Spore Mushrooms</div><div class="chars-row" id="spores"></div></div>
  <div class="group"><div class="group-label">Big Vines</div><div class="flora-row" id="vines"></div></div>
</div>

<script>
// ── RENDERER ─────────────────────────────────────────────────────────────
function renderSprite(rows, pal, sc) {
  const w = rows[0].length, h = rows.length;
  const cv = document.createElement('canvas');
  cv.width = w*sc; cv.height = h*sc;
  const ctx = cv.getContext('2d');
  for (let y=0;y<h;y++) for (let x=0;x<w;x++) {
    const c=rows[y][x]; if(c!=='.'&&pal[c]){ctx.fillStyle=pal[c];ctx.fillRect(x*sc,y*sc,sc,sc);}
  }
  return cv;
}

// ── PALETTE ───────────────────────────────────────────────────────────────
const SKIN='#f2c07a',EYE='#1e0e04',MOUTH='#b05840',OUTL='#2a1604',WHITE='#f8f4e8',SHOE='#2a1604';
const SG='#4a9030',SD='#2a6018';
function cp(R,r,G,g){return{R,r,W:WHITE,S:SKIN,s:'#cc9050',e:EYE,m:MOUTH,G,g,B:OUTL,X:SHOE,l:EYE,o:'#c05840',O:'#903020',k:'#201008',Y:'#f8d820',C:'#f8d020',c:'#6a3a08'};}

// ── CAP TYPES (all 8 wide) ────────────────────────────────────────────────
const DOT2='RRWRRWRR', DOT3='RWRWRWRR';
function getCapRows(type,dot){
  switch(type){
    case'A':return['..RRRR..','.RRRRRR.','RRRRRRRR',dot,'RRRRRRRR','.rRRRRr.']; // standard 6r
    case'B':return['.RRRRRR.','RRRRRRRR',dot,'.rRRRRr.']; // flat 4r
    case'C':return['...RR...','..RRRR..','.RRRRRR.','RRRRRRRR',dot,'RRRRRRRR','.rRRRRr.']; // dome 7r
    case'D':return['....R...','..RRRR..','RRRRRRRR',dot,'.rRRRRr.']; // pointed 5r
    case'E':return['.R.RR.R.','RRRRRRRR','RRRRRRRR',dot,'.rRRRRr.']; // wavy 5r
  }
}
const BODY=['.BBBBBB.','.SSSSSS.','.SeSSes.','.SSmSSS.','.BBBBBB.','.GGGGGG.','..GGGG..'];
const LA=['..G..G..','..X..X..'],LB=['.G....G.','.X....X.'],LQ=['..GG.GG.','...X.X..'],LC=['G......G','X......X'];

function buildFrames(capType,dot,animType){
  const cap=getCapRows(capType,dot);
  const lb=animType==='bob'?LQ:LB;
  return{fA:[...cap,...BODY,...LA],fB:[...cap,...BODY,...lb],fC:[...cap,...BODY,...LC]};
}

// ── EXPRESSIONS ───────────────────────────────────────────────────────────
const EXPRS=[['happy','.SeSSes.','.SmSSSmS'],['sad','.SeSSes.','.SSSSmSm'],['surprised','.SeSSes.','.SSOoSSS'],['sleepy','.SlSSlS.','.SSmSSS.']];
function buildExpr(dot,ey,mo){return['..RRRR..','.RRRRRR.','RRRRRRRR',dot,'.rRRRRr.','.BBBBBB.',ey,mo,'.BBBBBB.'];}

// ── ANIMATION SYSTEM ──────────────────────────────────────────────────────
const allChars=[];
let is8bit=false,gFrame=0,frameTimer;
function advanceFrames(){
  gFrame=(gFrame+1)%4;
  allChars.forEach(({cvs,animType})=>{
    const cnt=(is8bit&&animType==='walk')?3:2;
    cvs.forEach((cv,i)=>cv.style.display=(i===gFrame%cnt)?'block':'none');
  });
}
frameTimer=setInterval(advanceFrames,190);
function toggleMode(){
  is8bit=!is8bit;
  document.body.classList.toggle('mode-8bit',is8bit);
  const btn=document.getElementById('modeBtn');
  btn.textContent=is8bit?'🟢 SMOOTH MODE':'⬛ 8-BIT MODE';
  btn.classList.toggle('active',is8bit);
  clearInterval(frameTimer);
  frameTimer=setInterval(advanceFrames,is8bit?115:190);
}

// ── ADD SEASONAL CHARACTER ────────────────────────────────────────────────
function addChar(id,name,dot,pal,animType,delay,dur,capType){
  capType=capType||'A';
  const{fA,fB,fC}=buildFrames(capType,dot,animType);
  const cvA=renderSprite(fA,pal,5);
  const cvB=renderSprite(fB,pal,5); cvB.style.display='none';
  const cvC=renderSprite(fC,pal,5); cvC.style.display='none';
  allChars.push({cvs:[cvA,cvB,cvC],animType});
  const kf=animType==='walk'?'walkAnim':animType==='bob'?'bobAnim':'wigAnim';
  const wrap=document.createElement('div');
  wrap.className='anim-wrap'; wrap.dataset.anim=animType;
  wrap.style.animation=`${kf} ${dur}s ease-in-out ${delay}s infinite`;
  wrap.append(cvA,cvB,cvC);
  const strip=document.createElement('div'); strip.className='expr-strip';
  EXPRS.forEach(([,ey,mo])=>strip.appendChild(renderSprite(buildExpr(dot,ey,mo),pal,3)));
  const card=document.createElement('div'); card.className='char-card';
  const nm=document.createElement('div'); nm.className='char-name'; nm.textContent=name;
  card.append(wrap,nm,strip);
  document.getElementById(id).appendChild(card);
}

// ── ADD SINGLE-CANVAS CHARACTER (King, Queen, etc.) ───────────────────────
function addSingle(id,name,cls,rows,pal,animKey,dur,delay,sc){
  sc=sc||5;
  const cv=renderSprite(rows,pal,sc);
  allChars.push({cvs:[cv,cv,cv],animType:'bob'});
  const kfMap={bob:'bobAnim',walk:'walkAnim',wig:'wigAnim',float:'floatAnim'};
  const wrap=document.createElement('div'); wrap.className='anim-wrap'; wrap.dataset.anim=animKey;
  wrap.style.animation=`${kfMap[animKey]||'bobAnim'} ${dur}s ease-in-out ${delay}s infinite`;
  wrap.appendChild(cv);
  const card=document.createElement('div'); card.className='char-card';
  const nm=document.createElement('div'); nm.className='char-name'; nm.textContent=name;
  card.appendChild(wrap); card.appendChild(nm);
  if(cls){const cl=document.createElement('div');cl.className='char-class';cl.textContent=cls;card.appendChild(cl);}
  document.getElementById(id).appendChild(card);
}

// ── ADD BABY ──────────────────────────────────────────────────────────────
function addBaby(id,name,R,r,G,g,delay){
  const d6='RWRWRR';
  const pal={R,r,W:WHITE,S:SKIN,s:'#cc9050',e:EYE,m:MOUTH,G,g,B:OUTL,X:SHOE};
  const rows=['.RRRR.','RRRRRR',d6,'.rRRr.','.BBBB.','.SSSS.','.eSSe.','.SSmS.','.BBBB.','.GGGG.','.G..G.','.X..X.'];
  const cv=renderSprite(rows,pal,5);
  // pure CSS bob, no frame swap, no blink
  const wrap=document.createElement('div'); wrap.className='anim-wrap'; wrap.dataset.anim='gentlebob';
  const dur=1.7+Math.random()*0.5;
  wrap.style.animation=`gentleBob ${dur.toFixed(2)}s ease-in-out ${delay}s infinite`;
  wrap.appendChild(cv);
  const card=document.createElement('div'); card.className='char-card';
  const nm=document.createElement('div'); nm.className='char-name'; nm.textContent=name;
  card.append(wrap,nm);
  document.getElementById(id).appendChild(card);
}

// ── ADD FLORA ─────────────────────────────────────────────────────────────
function addFlora(id,name,rows,pal,animCls,dur,del){
  const cv=renderSprite(rows,pal,4);
  const wrap=document.createElement('div');
  wrap.className='flora-wrap '+animCls;
  wrap.style.setProperty('--fd',dur+'s');
  wrap.style.setProperty('--fdl',del+'s');
  wrap.appendChild(cv);
  const card=document.createElement('div'); card.className='flora-card';
  const lbl=document.createElement('div'); lbl.className='flora-name'; lbl.textContent=name;
  card.append(wrap,lbl);
  document.getElementById(id).appendChild(card);
}

// ── FLORA PIXEL DATA ──────────────────────────────────────────────────────
const TULIP  =['..PP..','.PPPP.','.PPPP.','PPPPPP','.pPPp.','..pp..','..GG..','..GG..','.gGG..','..GG..','..GG..','..GG..','..GG..','..GG..'];
const DAISY  =['..W.W...','.WWYWWW.','WWYYYWWW','.WWYWWW.','..W.W...','...G....','...G....','..GGG...','...G....','...G....','...G....','...G....','...G....'];
const ROSE   =['..PP..','.PPPP.','PPPPPP','PpPpPP','.PPPP.','..pp..','..GG..','..GG..','.gGG..','..GG..','..GG..','..GG..','..GG..'];
const SUNFL  =['..YYY...','.YYYYYY.','YYYcccYY','YYYcccYY','YYYcccYY','.YYYYYY.','..YYY...','...GG...','...GG...','..GGG...','...GG...','...GG...','...GG...','...GG...'];
const POPPY  =['..PP..','.PPPP.','PPPPPP','PPPkPP','PPkkPP','.PPkP.','..GG..','..GG..','..GG..','..GG..','..GG..','..GG..'];
const LAVEND =['.LLll.','LLLlll','.LLll.','.LLll.','.LLll.','..GG..','..GG..','..GG..','.gG...','..GG..','..GG..','..GG..','..GG..','..GG..'];
const CHRY   =['..PPPP..','.PPPPPP.','PPPPPPPP','PPPpPPPP','PPPPPPPP','.PPPPPP.','..PPPP..','...GG...','..GGG...','...GG...','...GG...','...GG...','...GG...'];
const MARI   =['..PPP..','.PPPPP.','PPPPPPP','PPPpPPP','.PPPPP.','..PPP..','...GG..','...GG..','..gGG..','...GG..','...GG..','...GG..'];
const LEAF   =['..LLLL..','.LLLLLL.','LLLLLLLL','LlLLLLlL','.LLLLLL.','..LLLL..','...LL...','...ll...'];
const HOLLY  =['..GG.GG.','.GGGGGGG','GGGGGGGG','.GGGGGGG','..GG.GG.','...RRR..','...RRR..','....GG..','....GG..','....GG..','....GG..'];
const PINE   =['....T....','...TTT...','..TTTTT..','.TTTTTTT.','TTTTTTTTT','....B....','....B....','....B....'];
const SNOWFL =['....S....','..S.S.S..','...SSS...','SSSSSSSSS','...SSS...','..S.S.S..','....S....'];
const BLBELL =['.BBBB.','BBBBBB','BbBBbB','.BBBB.','..BB..','..GG..','.GGG..','..GG..','..GG..','..GG..','..GG..','..GG..'];
const CHERRY =['..PP..','.PPPP.','PPPPPP','PPpPPP','.PPPP.','..pp..','..GG..','..GG..','.gGG..','..GG..','..GG..','..GG..','..GG..','..GG..'];

// ── KING & QUEEN PIXEL DATA ───────────────────────────────────────────────
const KING_ROWS=[
  '..C.C.C.','CCCCCCCC','..RRRR..', // crown then cap
  '.RRRRRR.','RRRRRRRR','RRWRRWRR','RRRRRRRR','.rRRRRr.',
  '.BBBBBB.','.SSSSSS.','.SeSSes.','.SSmSSS.','.BBBBBB.',
  'Z.PPPPPP','Z.PPPPPP','Z..P..P.','...X..X.',
];
const KING_PAL={C:'#f8d020',R:'#a02010',r:'#700808',W:WHITE,S:SKIN,s:'#cc9050',e:EYE,m:MOUTH,B:OUTL,X:SHOE,Z:'#c8a010',P:'#7028b0'};

const QUEEN_ROWS=[
  '..C.C.C.','CCCCCCCC', // crown
  '..PPPP..', // pink cap
  '.PPPPPP.','PPPPPPPP','PPwPPwPP','PPPPPPPP','.pPPPPp.',
  '.BBBBBB.','.SSSSSS.','.SeSSes.','.SSmSSS.','.BBBBBB.',
  '.DDDDDD.','DDDDDDDD','DDDDDDDD','.DDDDDD.','..D..D..','..X..X..',
];
const QUEEN_PAL={C:'#f8d020',P:'#f080b8',p:'#b04880',w:WHITE,S:SKIN,s:'#cc9050',e:EYE,m:MOUTH,B:OUTL,X:SHOE,D:'#e050a0'};

// ── SEASON DATA ───────────────────────────────────────────────────────────
// [name, capC, capD, clothC, clothD, animType, spd, delay, capType]
const SEASONS=[
  { cid:'sc', fid:'sf',
    chars:[
      ['Cherry Blossom','#f0a8c8','#b06888','#3a8830','#1a5818','walk',3.0,-0.0,'A'],
      ['Meadow',        '#70c860','#388820','#c080d0','#804898','bob', 0.9,-0.4,'A'],
      ['April Rain',    '#c090e0','#8050b8','#2888a8','#107888','wig', 0.55,-0.8,'A'],
      ['Dewdrop',       '#88e0b0','#408868','#e07878','#b03838','walk',2.8,-1.2,'A'],
      ['Breezy',        '#b0e0f0','#608898','#e09030','#a05010','bob', 1.0,-1.6,'A'],
      // new — different mushroom types
      ['Chanterelle',   '#e8a020','#a06008','#3a7020','#1a4010','bob', 1.1,-2.0,'E'], // wavy cap
      ['Oyster',        '#d0c8b0','#909080','#607848','#304020','walk',3.2,-2.4,'B'], // flat cap
      ['Fairy Ring',    '#c890f0','#9060c8','#30c090','#108060','wig', 0.52,-2.8,'D'], // pointed
      ['Spring Fawn',   '#c0a060','#806030','#70b040','#408010','bob', 1.3,-3.2,'C'], // dome
    ],
    flora:[
      ['Cherry Blossom',CHERRY,{P:'#f8c0d8',p:'#e080a0',G:SG,g:SD},'flora-bop',  1.7,-0.0],
      ['Pink Tulip',    TULIP, {P:'#f090c8',p:'#c06888',G:SG,g:SD},'flora-sway', 2.2,-0.5],
      ['Daisy',         DAISY, {W:WHITE,Y:'#f0d020',G:SG,g:SD},    'flora-bop',  1.5,-1.0],
      ['Lavender',      LAVEND,{L:'#c090e8',l:'#9060c0',G:SG,g:SD},'flora-quiver',1.1,-0.3],
      ['Pink Rose',     ROSE,  {P:'#f080b0',p:'#b04870',G:SG,g:SD},'flora-sway', 2.6,-0.7],
    ],
  },
  { cid:'uc', fid:'uf',

// ── BUILD ROYALS (gentle bobbing — single canvas, smooth) ─────────────────
function addRoyalBop(id, name, cls, capRows, palBase, dur, delay) {
  const SC = 5;
  const fA = [...capRows, '..G..G..', '..X..X..'];
  const cv = renderSprite(fA, palBase, SC);
  // NOT pushed to allChars — uses pure CSS bob, no frame-swap blink
  const wrap = document.createElement('div');
  wrap.className = 'anim-wrap'; wrap.dataset.anim = 'royalbob';
  wrap.style.animation = `royalBop ${dur}s ease-in-out ${delay}s infinite`;
  wrap.appendChild(cv);
  const card = document.createElement('div'); card.className='char-card';
  const nm = document.createElement('div'); nm.className='char-name'; nm.textContent=name;
  card.append(wrap, nm);
  if (cls) { const cl=document.createElement('div'); cl.className='char-class'; cl.textContent=cls; card.appendChild(cl); }
  document.getElementById(id).appendChild(card);
}

// ── CUTE SPORE MUSHROOMS (just mushrooms, no faces) ───────────────────────
function addSporeMush(id, name, capRows, pal, sporeColor, scale, dur, delay) {
  scale = scale || 6;
  const cv = renderSprite(capRows, pal, scale);
  // gentle CSS-only bob — no frame swap, no blink
  const bobWrap = document.createElement('div');
  bobWrap.className = 'anim-wrap'; bobWrap.dataset.anim = 'gentlebob';
  bobWrap.style.animation = `gentleBob ${dur}s ease-in-out ${delay}s infinite`;
  bobWrap.appendChild(cv);
  // spore container (sits behind/around)
  const sporeWrap = document.createElement('div');
  sporeWrap.className = 'spore-wrap';
  // create 3 spore particles emerging from cap top center
  const w = capRows[0].length * scale;
  const positions = [
    { cls:'spore-L', left:w*0.35, top:6 },
    { cls:'spore-U', left:w*0.5,  top:4 },
    { cls:'spore-R', left:w*0.65, top:6 },
  ];
  positions.forEach(p => {
    const dot = document.createElement('div');
    dot.className = 'spore-particle ' + p.cls;
    dot.style.background = sporeColor;
    dot.style.left = (p.left - 3) + 'px';
    dot.style.top = p.top + 'px';
    sporeWrap.appendChild(dot);
  });
  sporeWrap.appendChild(bobWrap);
  const card = document.createElement('div'); card.className='char-card';
  card.appendChild(sporeWrap);
  const nm = document.createElement('div'); nm.className='char-name'; nm.textContent=name;
  card.appendChild(nm);
  document.getElementById(id).appendChild(card);
}

// LARGE corner/border vines — built procedurally for size
function makeBorderVine(W, H, opts) {
  // Snaking thick vine with branches/leaves
  const rows = Array.from({length:H}, () => '.'.repeat(W).split(''));
  const cx = Math.floor(W/2);
  // main snaking trunk
  for (let y = 0; y < H; y++) {
    const phase = Math.sin(y * 0.18 + (opts.phase||0));
    const x = Math.round(cx + phase * (W*0.32));
    // thick trunk: 2-3 wide
    for (let dx = -1; dx <= 1; dx++) {
      if (rows[y][x+dx] !== undefined) rows[y][x+dx] = 'V';
    }
    if (rows[y][x+2] !== undefined) rows[y][x+2] = 'v'; // shadow
    // periodic leaf clusters
    if (y % 6 === 2) {
      const side = phase > 0 ? -1 : 1;
      for (let lx = 1; lx <= 4; lx++) {
        if (rows[y][x + side*lx] !== undefined) rows[y][x + side*lx] = 'L';
        if (y > 0 && rows[y-1][x + side*lx] !== undefined && lx <= 3) rows[y-1][x + side*lx] = 'L';
        if (y < H-1 && rows[y+1][x + side*lx] !== undefined && lx <= 3) rows[y+1][x + side*lx] = 'l';
      }
      // big leaf tip
      if (rows[y][x + side*5] !== undefined) rows[y][x + side*5] = 'L';
    }
    // periodic flowers / berries
    if (opts.flowers && y % 9 === 5) {
      const side = phase > 0 ? 1 : -1;
      for (let fx = 1; fx <= 2; fx++) {
        if (rows[y][x + side*fx] !== undefined) rows[y][x + side*fx] = 'P';
        if (y > 0 && rows[y-1][x + side*fx] !== undefined) rows[y-1][x + side*fx] = 'P';
      }
      if (rows[y][x + side*3] !== undefined) rows[y][x + side*3] = 'p';
    }
  }
  // root knot at top
  for (let y = 0; y < 3; y++)
    for (let x = cx-2; x <= cx+2; x++)
      if (rows[y] && rows[y][x] !== undefined) rows[y][x] = 'B';
  return rows.map(r => r.join(''));
}
